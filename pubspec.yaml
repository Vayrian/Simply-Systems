name: Simply_Systems
description: A privacy-first app for plural systems to manage members, fronting, communication, and selective sharing.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  google_fonts: ^6.2.1
  flutter_blurhash: ^0.7.0
  flutter_neumorphic: ^3.2.0         # glass/neumorphic feel
  iconsax: ^0.0.8                    # modern line icons 
  animations: ^2.0.11

  provider: ^6.1.2
  http: ^1.2.2
  jwt_decoder: ^2.0.1
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  fl_chart: ^0.68.0
  socket_io_client: ^2.0.3+1
  intl: ^0.19.0
  cupertino_icons: ^1.0.8
  path_provider: ^2.1.3  # For Hive storage path

dev_dependencies:
  flutter_test:
    sdk: flutter

  hive_generator: ^2.0.1
  build_runner: ^2.4.12
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true